<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Can Sözbir</title>
  <meta name="description" content="Selected work and open-source projects by Can Sözbir — pulled live from GitHub." />
  <meta name="theme-color" content="#08090c" />
  <meta property="og:title" content="Projects — Can Sözbir" />
  <meta property="og:description" content="Selected work and open-source projects, live from GitHub." />
  <meta property="og:image" content="https://github.com/cansozbir.png" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="alternate icon" type="image/png" href="/assets/favicon.png" />
  <style>
    :root {
      --bg: #08090c; --panel: rgba(255,255,255,0.025); --panel-2: rgba(12,14,20,0.55);
      --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.16);
      --text: #ecedf1; --muted: #8b8f9a; --faint: #5a5e6a;
      --accent: #7c85ff; --accent-2: #22d3ee; --glow: rgba(124,133,255,0.5);
      --maxw: 1040px; --ease: cubic-bezier(0.22,1,0.36,1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }
    ::selection { background: var(--accent); color: #08090c; }
    .mono { font-family: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, Consolas, monospace; }
    .wrap { max-width: var(--maxw); margin: 0 auto; padding-left: clamp(20px,5vw,32px); padding-right: clamp(20px,5vw,32px); }

    /* background */
    .grid-overlay { position: fixed; inset: 0; z-index: -2; pointer-events: none;
      background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 64px 64px; mask-image: radial-gradient(ellipse 80% 55% at 50% 0%, #000 20%, transparent 80%); -webkit-mask-image: radial-gradient(ellipse 80% 55% at 50% 0%, #000 20%, transparent 80%); }

    /* nav */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between;
      padding: 15px clamp(20px,5vw,40px); backdrop-filter: blur(10px); background: linear-gradient(to bottom, rgba(8,9,12,0.75), transparent); transition: background .3s, border-color .3s; border-bottom: 1px solid transparent; }
    nav.scrolled { background: rgba(8,9,12,0.82); border-bottom: 1px solid var(--border); }
    nav .brand { font-weight: 650; font-size: .95rem; display: flex; align-items: center; gap: 9px; letter-spacing: -0.01em; }
    nav .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--glow); }
    nav .links { display: flex; gap: 24px; font-size: .875rem; }
    nav .links a { color: var(--muted); transition: color .2s; }
    nav .links a:hover, nav .links a[aria-current] { color: var(--text); }
    nav .links a[aria-current] { color: var(--accent); }
    @media (max-width: 560px) { nav .links a.hide-sm { display: none; } }

    /* hero band with raymarch canvas + scrim */
    .hero { position: relative; min-height: 62vh; display: flex; align-items: flex-end; overflow: hidden; border-bottom: 1px solid var(--border); }
    #gl { position: absolute; inset: 0; width: 100%; height: 100%; display: block; z-index: 0; }
    .hero .scrim { position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background: linear-gradient(to top, var(--bg) 4%, rgba(8,9,12,0.35) 45%, rgba(8,9,12,0.15) 100%),
                  linear-gradient(to right, rgba(8,9,12,0.65), transparent 60%); }
    .hero .inner { position: relative; z-index: 2; padding-top: 120px; padding-bottom: 44px; width: 100%; }
    .eyebrow { font-size: .78rem; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent); display: inline-flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .eyebrow::before { content: ""; width: 28px; height: 2px; background: var(--accent); border-radius: 2px; }
    .hero h1 { font-size: clamp(2.4rem,7vw,4.2rem); letter-spacing: -0.04em; font-weight: 700; line-height: 1; margin-bottom: 14px; }
    .hero h1 .grad { background: linear-gradient(120deg,#fff,var(--accent) 55%,var(--accent-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .hero p { color: var(--muted); max-width: 520px; font-size: 1.02rem; }
    .hero p .live { color: var(--accent-2); }

    /* controls */
    .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; padding: 30px 0 6px; }
    .chip { font-size: .82rem; font-weight: 550; color: var(--muted); border: 1px solid var(--border); background: var(--panel); border-radius: 999px; padding: 7px 15px; cursor: pointer; transition: all .2s var(--ease); display: inline-flex; align-items: center; gap: 7px; }
    .chip:hover { color: var(--text); border-color: var(--border-strong); }
    .chip[data-active] { color: #08090c; background: var(--accent); border-color: transparent; font-weight: 650; }
    .chip .cdot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; opacity: .8; }
    .count { margin-left: auto; color: var(--faint); font-size: .8rem; }

    /* grid */
    main { padding-bottom: 90px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 18px; margin-top: 22px; perspective: 1000px; }
    .card { position: relative; border: 1px solid var(--border); border-radius: 18px; background: var(--panel); padding: 22px; overflow: hidden;
      transform-style: preserve-3d; transition: transform .18s var(--ease), border-color .3s, opacity .4s, box-shadow .3s; display: flex; flex-direction: column; min-height: 178px; }
    .card::before { content: ""; position: absolute; inset: 0; background: radial-gradient(340px circle at var(--mx,50%) var(--my,50%), rgba(124,133,255,0.16), transparent 55%); opacity: 0; transition: opacity .3s; pointer-events: none; }
    .card:hover { border-color: var(--border-strong); box-shadow: 0 24px 60px -24px rgba(0,0,0,0.7); }
    .card:hover::before { opacity: 1; }
    .card.hidden { display: none; }
    .card .head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .card .repo-ico { color: var(--accent); flex-shrink: 0; }
    .card h3 { font-size: 1.06rem; font-weight: 650; letter-spacing: -0.01em; word-break: break-word; }
    .card .desc { color: var(--muted); font-size: .9rem; flex: 1; }
    .card .topics { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
    .card .topics span { font-size: .68rem; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; }
    .card .meta { display: flex; align-items: center; gap: 16px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); font-size: .78rem; color: var(--muted); }
    .card .meta .m { display: inline-flex; align-items: center; gap: 5px; }
    .card .meta svg { width: 13px; height: 13px; }
    .card .lang { display: inline-flex; align-items: center; gap: 6px; }
    .card .lang .ld { width: 10px; height: 10px; border-radius: 50%; }
    .card .live-pill { margin-left: auto; color: var(--accent-2); display: inline-flex; align-items: center; gap: 4px; }
    .card .arrow { position: absolute; top: 20px; right: 20px; color: var(--faint); transition: transform .25s var(--ease), color .25s; }
    .card:hover .arrow { color: var(--accent); transform: translate(3px,-3px); }

    /* skeleton + states */
    .skeleton { border: 1px solid var(--border); border-radius: 18px; background: var(--panel); min-height: 178px; position: relative; overflow: hidden; }
    .skeleton::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); transform: translateX(-100%); animation: shimmer 1.3s infinite; }
    @keyframes shimmer { to { transform: translateX(100%); } }
    .state { text-align: center; color: var(--muted); padding: 50px 20px; border: 1px dashed var(--border); border-radius: 18px; margin-top: 22px; }
    .state a { color: var(--accent); }

    footer { border-top: 1px solid var(--border); padding: 28px 0; }
    .foot { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 12px; color: var(--faint); font-size: .82rem; }
    .foot a:hover { color: var(--text); }

    .reveal { opacity: 0; transform: translateY(20px); transition: opacity .6s var(--ease), transform .6s var(--ease); }
    .reveal.in { opacity: 1; transform: none; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; transition: none !important; } .reveal { opacity: 1; transform: none; } .card { transform: none !important; } }
  </style>
</head>
<body>
  <div class="grid-overlay"></div>

  <nav id="nav">
    <a class="brand" href="index.html"><span class="dot"></span>Can Sözbir</a>
    <div class="links">
      <a href="index.html" class="hide-sm">Home</a>
      <a href="index.html#work" class="hide-sm">Experience</a>
      <a href="projects.html" aria-current="page">Projects</a>
      <a href="index.html#contact">Contact</a>
    </div>
  </nav>

  <header class="hero">
    <canvas id="gl" aria-hidden="true"></canvas>
    <div class="scrim"></div>
    <div class="inner wrap">
      <div class="eyebrow">Projects</div>
      <h1>Things I've <span class="grad">built</span>.</h1>
      <p>A selection of open-source projects and experiments I've built and shared.</p>
    </div>
  </header>

  <main class="wrap">
    <div class="controls" id="controls" hidden>
      <!-- language filter chips injected here -->
    </div>
    <div class="grid" id="grid" aria-live="polite">
      <!-- skeletons, then cards -->
      <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>
  </main>

  <footer>
    <div class="wrap foot">
      <span>© <span id="year">2026</span> Can Sözbir</span>
      <span><a href="index.html">← Back home</a> · <a href="https://github.com/cansozbir" target="_blank" rel="noopener">GitHub ↗</a></span>
    </div>
  </footer>

  <script>
  var USERNAME = "cansozbir";
  var MAX_CARDS = 12;
  document.getElementById('year').textContent = new Date().getFullYear();
  var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

  var nav = document.getElementById('nav');
  addEventListener('scroll', function(){ nav.classList.toggle('scrolled', scrollY > 20); }, { passive: true });

  /* ---------------- GitHub language colours ---------------- */
  var LANG = {
    JavaScript:'#f1e05a', TypeScript:'#3178c6', Python:'#3572A5', 'C#':'#178600', Go:'#00ADD8',
    HTML:'#e34c26', CSS:'#563d7c', SCSS:'#c6538c', Java:'#b07219', Shell:'#89e051', Dockerfile:'#384d54',
    Vue:'#41b883', 'Jupyter Notebook':'#DA5B0B', 'C++':'#f34b7d', C:'#555555', Ruby:'#701516',
    PHP:'#4F5D95', Rust:'#dea584', Kotlin:'#A97BFF', Swift:'#F05138', Dart:'#00B4AB'
  };
  function langColor(l){ return LANG[l] || '#8b8f9a'; }

  function esc(s){ var d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }
  function ago(iso){
    var d = (Date.now() - new Date(iso).getTime())/1000;
    var u = [['yr',31536000],['mo',2592000],['w',604800],['d',86400],['h',3600],['m',60]];
    for (var i=0;i<u.length;i++){ var n = Math.floor(d/u[i][1]); if (n >= 1) return n + u[i][0] + ' ago'; }
    return 'just now';
  }
  var STAR = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3 6.5 7 .9-5 4.8 1.3 7L12 18l-6.6 3.2L6.7 14 1.7 9.4l7-.9z"/></svg>';
  var FORK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="4" r="2"/><circle cx="18" cy="4" r="2"/><circle cx="12" cy="20" r="2"/><path d="M6 6v4a4 4 0 0 0 4 4h4a4 4 0 0 0 4-4V6M12 14v4"/></svg>';
  var REPOICO = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v18H6.5A2.5 2.5 0 0 0 4 22.5z"/><path d="M4 17.5A2.5 2.5 0 0 1 6.5 15H20"/></svg>';
  var ARROW = '<svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M9 7h8v8"/></svg>';

  var grid = document.getElementById('grid');
  var controls = document.getElementById('controls');

  // Pinned repos come from a public scraper service (GitHub only exposes pins via
  // authenticated GraphQL, which a static page can't do safely). We enrich the pins
  // with live REST data (homepage/topics/fresh counts) and, if the pin service is
  // down, gracefully fall back to top repos by stars so the page never breaks.
  var PINNED_URL = 'https://pinned.berrysauce.dev/get/' + USERNAME;
  var REST_URL = 'https://api.github.com/users/' + USERNAME + '/repos?per_page=100&sort=pushed';

  Promise.all([
    fetch(PINNED_URL).then(function(r){ return r.ok ? r.json() : []; }).catch(function(){ return []; }),
    fetch(REST_URL, { headers: { 'Accept': 'application/vnd.github+json' } }).then(function(r){ return r.ok ? r.json() : []; }).catch(function(){ return []; })
  ]).then(function(res){
    var pinned = Array.isArray(res[0]) ? res[0] : [];
    var repos  = Array.isArray(res[1]) ? res[1] : [];
    var byName = {};
    repos.forEach(function(r){ byName[(r.name||'').toLowerCase()] = r; });

    var list;
    if (pinned.length) {
      list = pinned.map(function(p){
        var full = byName[(p.name||'').toLowerCase()] || {};
        return {
          name: p.name,
          html_url: full.html_url || ('https://github.com/' + (p.author||USERNAME) + '/' + p.name),
          description: full.description || p.description || '',
          language: p.language || full.language || '',
          stargazers_count: (full.stargazers_count != null ? full.stargazers_count : (p.stars || 0)),
          forks_count: (full.forks_count != null ? full.forks_count : (p.forks || 0)),
          homepage: full.homepage || '',
          topics: full.topics || [],
          pushed_at: full.pushed_at || null
        };
      });
    } else if (repos.length) {
      list = repos
        .filter(function(r){ return !r.fork && !r.archived; })
        .sort(function(a,b){ return (b.stargazers_count - a.stargazers_count) || (new Date(b.pushed_at) - new Date(a.pushed_at)); })
        .slice(0, MAX_CARDS);
    } else {
      throw new Error('empty');
    }
    if (!list.length) throw new Error('empty');
    render(list);
  }).catch(function(){
    grid.innerHTML = '<div class="state">Couldn’t load projects right now — see everything on ' +
      '<a href="https://github.com/' + USERNAME + '" target="_blank" rel="noopener">github.com/' + USERNAME + ' ↗</a></div>';
  });

  function render(list){
    // build cards
    grid.innerHTML = '';
    list.forEach(function(r){
      var lang = r.language || '';
      var topics = (r.topics || []).slice(0, 3);
      var a = document.createElement('a');
      a.className = 'card reveal';
      a.href = r.html_url; a.target = '_blank'; a.rel = 'noopener';
      a.setAttribute('data-lang', lang || '—');
      a.innerHTML =
        ARROW +
        '<div class="head"><span class="repo-ico">' + REPOICO + '</span><h3>' + esc(r.name) + '</h3></div>' +
        '<div class="desc">' + (esc(r.description) || '<span style="color:var(--faint)">No description.</span>') + '</div>' +
        (topics.length ? '<div class="topics">' + topics.map(function(t){ return '<span>' + esc(t) + '</span>'; }).join('') + '</div>' : '') +
        '<div class="meta">' +
          (lang ? '<span class="lang"><span class="ld" style="background:' + langColor(lang) + '"></span>' + esc(lang) + '</span>' : '') +
          '<span class="m">' + STAR + (r.stargazers_count||0) + '</span>' +
          '<span class="m">' + FORK + (r.forks_count||0) + '</span>' +
          (r.homepage ? '<span class="live-pill">live ↗</span>' : (r.pushed_at ? '<span class="m" style="margin-left:auto;color:var(--faint)">' + ago(r.pushed_at) + '</span>' : '')) +
        '</div>';
      grid.appendChild(a);
    });

    setupTilt();
    buildFilters(list);
    revealCards();
  }

  /* ---------------- language filter ---------------- */
  function buildFilters(list){
    var langs = {};
    list.forEach(function(r){ if (r.language) langs[r.language] = (langs[r.language]||0)+1; });
    var names = Object.keys(langs).sort(function(a,b){ return langs[b]-langs[a]; });
    controls.hidden = false;
    controls.innerHTML = '';
    var all = mkChip('All', null, list.length, true);
    controls.appendChild(all);
    names.forEach(function(n){ controls.appendChild(mkChip(n, langColor(n), langs[n], false)); });
    var count = document.createElement('span'); count.className = 'count mono'; count.id = 'count';
    count.textContent = list.length + ' repos'; controls.appendChild(count);
  }
  function mkChip(label, color, n, active){
    var c = document.createElement('button');
    c.className = 'chip'; if (active) c.setAttribute('data-active','');
    c.innerHTML = (color ? '<span class="cdot" style="background:'+color+'"></span>' : '') + esc(label) + ' <span style="opacity:.55">'+n+'</span>';
    c.addEventListener('click', function(){
      [].forEach.call(controls.querySelectorAll('.chip'), function(x){ x.removeAttribute('data-active'); });
      c.setAttribute('data-active','');
      applyFilter(label === 'All' ? null : label);
    });
    return c;
  }
  function applyFilter(lang){
    var shown = 0;
    [].forEach.call(grid.querySelectorAll('.card'), function(card){
      var ok = !lang || card.getAttribute('data-lang') === lang;
      card.classList.toggle('hidden', !ok);
      if (ok) shown++;
    });
    var cnt = document.getElementById('count'); if (cnt) cnt.textContent = shown + (shown===1?' repo':' repos');
  }

  /* ---------------- 3D tilt + spotlight ---------------- */
  function setupTilt(){
    if (reduce) return;
    [].forEach.call(grid.querySelectorAll('.card'), function(card){
      card.addEventListener('pointermove', function(e){
        var b = card.getBoundingClientRect();
        var px = (e.clientX - b.left) / b.width, py = (e.clientY - b.top) / b.height;
        card.style.setProperty('--mx', (px*100) + '%');
        card.style.setProperty('--my', (py*100) + '%');
        card.style.transform = 'rotateY(' + ((px-0.5)*9) + 'deg) rotateX(' + (-(py-0.5)*9) + 'deg) translateY(-4px)';
      });
      card.addEventListener('pointerleave', function(){ card.style.transform = ''; });
    });
  }

  function revealCards(){
    if (reduce) { [].forEach.call(grid.querySelectorAll('.reveal'), function(el){ el.classList.add('in'); }); return; }
    var io = new IntersectionObserver(function(ents){
      ents.forEach(function(en, i){ if (en.isIntersecting){ en.target.style.transitionDelay = Math.min(i*35,180)+'ms'; en.target.classList.add('in'); io.unobserve(en.target); } });
    }, { threshold: 0.1 });
    [].forEach.call(grid.querySelectorAll('.reveal'), function(el){ io.observe(el); });
  }

  /* ---------------- hero: animated "contribution graph" field (canvas 2D) ----------------
     A grid of rounded cells (à la GitHub's contribution squares). A flowing diagonal
     wave lights them between faint and accent, and cells near the cursor bloom. Cheap,
     readable behind the scrim, and thematically on-brand for a projects page. ------------ */
  (function(){
    var canvas = document.getElementById('gl');
    var ctx = canvas.getContext('2d');
    if (!ctx) { canvas.style.background = 'radial-gradient(120% 120% at 70% 20%, #141830, #08090c 60%)'; return; }

    var A = [124,133,255], B = [34,211,238];               // indigo -> cyan
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var step = 22, cell = 15, cols = 0, rows = 0, W = 0, H = 0;
    var mouse = { x: -9999, y: -9999 };
    var rounded = typeof ctx.roundRect === 'function';

    function size(){
      W = canvas.clientWidth || canvas.parentNode.clientWidth || innerWidth;
      H = canvas.clientHeight || Math.round(innerHeight * 0.62);
      canvas.width = Math.floor(W * dpr); canvas.height = Math.floor(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cols = Math.ceil(W / step) + 1; rows = Math.ceil(H / step) + 1;
    }
    size();
    addEventListener('resize', size, { passive: true });
    canvas.addEventListener('pointermove', function(e){ var b = canvas.getBoundingClientRect(); mouse.x = e.clientX - b.left; mouse.y = e.clientY - b.top; }, { passive: true });
    canvas.addEventListener('pointerleave', function(){ mouse.x = -9999; mouse.y = -9999; });

    var R = 120;                                            // cursor bloom radius
    function draw(t){
      ctx.clearRect(0, 0, W, H);
      for (var r = 0; r < rows; r++){
        for (var c = 0; c < cols; c++){
          var x = c * step, y = r * step;
          var v = 0.5
                + 0.30 * Math.sin(c * 0.35 - t * 0.9 + Math.sin(r * 0.40 + t * 0.35) * 1.3)
                + 0.18 * Math.sin(r * 0.50 + t * 0.5);
          var dx = x + cell/2 - mouse.x, dy = y + cell/2 - mouse.y, d2 = dx*dx + dy*dy;
          if (d2 < R*R) v += (1 - Math.sqrt(d2) / R) * 0.9;

          if (v < 0.30) {
            ctx.fillStyle = 'rgba(255,255,255,0.035)';
          } else {
            var u = Math.min((v - 0.30) / 0.85, 1);
            var cr = (A[0] + (B[0]-A[0])*u) | 0, cg = (A[1] + (B[1]-A[1])*u) | 0, cb = (A[2] + (B[2]-A[2])*u) | 0;
            ctx.fillStyle = 'rgba(' + cr + ',' + cg + ',' + cb + ',' + (0.10 + 0.6*u).toFixed(3) + ')';
          }
          if (rounded) { ctx.beginPath(); ctx.roundRect(x, y, cell, cell, 3); ctx.fill(); }
          else { ctx.fillRect(x, y, cell, cell); }
        }
      }
    }

    var t0 = null, raf = null, run = true;
    function loop(ts){ if (!run) return; if (t0 === null) t0 = ts; draw((ts - t0) / 1000); raf = requestAnimationFrame(loop); }
    document.addEventListener('visibilitychange', function(){ run = !document.hidden; if (run && !reduce) { t0 = null; raf = requestAnimationFrame(loop); } });
    if (reduce) draw(2.0); else raf = requestAnimationFrame(loop);
  })();
